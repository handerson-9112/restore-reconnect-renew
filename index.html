<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restore, Reconnect, Renew</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8f3ec;
      color: #2f3a35;
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
      line-height: 1.6;
    }
    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    h1 {
      color: #5f7f73;
    }
    button {
      background: #f0b88f;
      border: none;
      border-radius: 999px;
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #e5a67b;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Restore, Reconnect, Renew</h1>
    <p><strong>Small care choices for educators — no pressure, no perfection.</strong></p>
    <p>Choose what fits. Skip what does not. Rest counts.</p>
    <button onclick="alert('Your app is live! Next, we will add the choice board.')">
      Start a Care Check-In
    </button>
  </main>
</body>
</html>
